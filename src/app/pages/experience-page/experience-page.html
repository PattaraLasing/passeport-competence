<div [formGroup]="experienceForm">
    <div class="zone" formGroupName="header">
        <p>Header Zone</p>
        <label>Titre</label>
        <input formControlName="title"><br>
        <label>Date</label>
        <input formControlName="date"><br>
        <label>Lieu</label>
        <input formControlName="location"><br>
        <label>Participants</label>
        <input formControlName="participants"><br>
    </div>
    <div class="zone" formGroupName="star">
        <p>STAR Zone</p>
        <label>Situation</label>
        <input formControlName="situation"><br>
        <label>Tâche</label>
        <input formControlName="task"><br>
        <label>Action</label>
        <input formControlName="action"><br>
        <label>Résultat</label>
        <input formControlName="result"><br>
    </div>
    <div class="zone" formGroupName="evidence">
        <p>Evidence Zone</p>
        <label>Genre</label>
        <input formControlName="genre"><br>
        <label>Titre</label>
        <input formControlName="name"><br>
        <label>Description</label>
        <input formControlName="description"><br>
    </div>
    <button (click)="saveExperience()">Enregistrer</button>
</div>
